name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  PNPM_VERSION: "10"

jobs:
  # ── Detect changes ────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      orchestrator: ${{ steps.filter.outputs.orchestrator }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
            api:
              - 'apps/api/**'
            orchestrator:
              - 'apps/orchestrator/**'
            packages:
              - 'packages/**'

  # ── TypeScript & Lint (Node.js) ───────────────────────────────────────────
  typecheck-lint:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @luxai/web run typecheck

      - name: Lint
        run: pnpm --filter @luxai/web run lint

      - name: Format check
        run: pnpm --filter @luxai/web exec prettier --check .

  # ── Python (API) ─────────────────────────────────────────────────────────
  lint-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src

      - name: Format check (ruff)
        run: ruff format --check src

      - name: Type check (mypy)
        run: mypy src

      - name: Tests
        run: pytest --cov=src --cov-report=xml -q
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: test-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          SUPABASE_JWT_SECRET: test-jwt-secret

  # ── Python (Orchestrator) ─────────────────────────────────────────────────
  lint-orchestrator:
    needs: changes
    if: needs.changes.outputs.orchestrator == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/orchestrator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src

      - name: Format check (ruff)
        run: ruff format --check src

      - name: Type check (mypy)
        run: mypy src

      - name: Tests
        run: pytest -q
        env:
          OPENAI_API_KEY: sk-test

  # ── Docker build check ────────────────────────────────────────────────────
  docker-build:
    needs: [typecheck-lint, lint-api, lint-orchestrator]
    if: |
      always() &&
      (needs.typecheck-lint.result == 'success' || needs.typecheck-lint.result == 'skipped') &&
      (needs.lint-api.result == 'success' || needs.lint-api.result == 'skipped') &&
      (needs.lint-orchestrator.result == 'success' || needs.lint-orchestrator.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, orchestrator]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.service }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
