name: Deploy

on:
  push:
    branches: [main]

# One deploy at a time — never cancel in-progress to prevent
# frontend/backend from being out of sync during a deploy window.
concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  PNPM_VERSION: "10"
  NODE_VERSION: "22"

jobs:
  # ── Backend → Fly.io ────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → Fly.io
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        # --remote-only: Fly builds the Docker image on its own infrastructure.
        # Avoids Docker-in-Docker and keeps CI fast (~2-3 min build).
        run: flyctl deploy --remote-only --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify health endpoint
        run: |
          sleep 15
          curl --fail --silent --show-error \
            https://luxai-api.fly.dev/api/v1/health | python3 -m json.tool
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Frontend → Vercel ───────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Vercel
    runs-on: ubuntu-latest
    environment: production
    # Deploy frontend after backend — ensures the API is healthy before
    # new UI code that depends on it goes live.
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm --filter @luxai/web run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        # Vercel CLI reads VERCEL_ORG_ID and VERCEL_PROJECT_ID from env.
        # --prod flag promotes the deployment to the production alias.
        # --yes skips interactive prompts.
        working-directory: apps/web
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
